<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .bg        { fill: #f5f5f7; }
      .window    { fill: #ffffff; stroke: #e5e5e7; stroke-width: 1; }
      .titlebar  { fill: #fbfbfd; }
      .topbar    { fill: #ffffff; }
      .divider   { stroke: #e5e5e7; stroke-width: 1; fill: none; }
      .subtle-div { stroke: #ececee; stroke-width: 1; fill: none; }
      .card      { fill: #ffffff; stroke: #e5e5e7; stroke-width: 1; }
      .chip      { fill: #f2f2f4; }
      .accent    { fill: #0071e3; }
      .accent-text { fill: #0071e3; }
      .text-primary   { fill: #1d1d1f; }
      .text-secondary { fill: #6e6e73; }
      .text-tertiary  { fill: #86868b; }
      .text-white    { fill: #ffffff; }
      .text-danger   { fill: #c7364a; }
      .strike    { text-decoration: line-through; fill: #a1a1a6; }
      .check-empty { fill: #ffffff; stroke: #d2d2d7; stroke-width: 1.5; }
      .check-done  { fill: #0071e3; stroke: none; }
      .age-label   { fill: #fef4e6; }
      .age-label-text { fill: #b26900; }
      .shadow     { fill: #000000; fill-opacity: 0.04; }
      .icon-btn   { fill: #ffffff; stroke: #e5e5e7; stroke-width: 1; }
      .row-focus  { fill: #fafafa; stroke: #e5e5e7; stroke-width: 1; }
      .menu-shadow { fill: #000000; fill-opacity: 0.12; }
      .menu-card { fill: #ffffff; stroke: #e5e5e7; stroke-width: 1; }
      .menu-hover { fill: #f0f6fd; }
      .menu-hover-danger { fill: #fdf2f4; }
      text { font-size: 13px; }
      .h-col   { font-size: 18px; font-weight: 600; }
      .h-sub   { font-size: 13px; font-weight: 400; }
      .chip-text { font-size: 11px; font-weight: 500; }
      .row-title { font-size: 14px; }
      .tab-label { font-size: 14px; font-weight: 500; }
      .brand  { font-size: 15px; font-weight: 600; letter-spacing: 0.2px; }
      .titlebar-text { font-size: 13px; font-weight: 500; }
      .page-title { font-size: 24px; font-weight: 600; }
      .page-date { font-size: 13px; }
      .menu-item { font-size: 13px; font-weight: 500; }
      .menu-hint { font-size: 11px; }
      .kbd { font-size: 10px; font-weight: 500; fill: #6e6e73; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="900"/>
  <rect class="shadow" x="16" y="24" width="1408" height="860" rx="14"/>
  <rect class="window" x="16" y="20" width="1408" height="860" rx="14"/>

  <!-- OS Titlebar -->
  <rect class="titlebar" x="16" y="20" width="1408" height="44" rx="14"/>
  <rect class="titlebar" x="16" y="48" width="1408" height="16"/>
  <line class="divider" x1="16" y1="64" x2="1424" y2="64"/>
  <circle cx="36" cy="42" r="6" fill="#ff5f57"/>
  <circle cx="56" cy="42" r="6" fill="#febc2e"/>
  <circle cx="76" cy="42" r="6" fill="#28c840"/>
  <text x="720" y="46" text-anchor="middle" class="text-secondary titlebar-text">(3) tempo</text>

  <!-- Top nav -->
  <rect class="topbar" x="17" y="65" width="1406" height="56"/>
  <line class="divider" x1="16" y1="120" x2="1424" y2="120"/>

  <g transform="translate(48, 80)">
    <rect x="0" y="0" width="28" height="28" rx="7" fill="#0071e3"/>
    <path d="M10 8 L20 6 L20 17 A3 3 0 1 1 17 15 L17 9.5 L12.5 10.5 L12.5 19 A3 3 0 1 1 9.5 17 Z" fill="#ffffff"/>
    <text x="40" y="19" class="text-primary brand">tempo</text>
  </g>

  <g transform="translate(180, 92)">
    <g>
      <text x="0" y="0" class="accent-text tab-label">Dashboard</text>
      <rect x="-2" y="12" width="74" height="2" rx="1" class="accent"/>
    </g>
    <g transform="translate(104, 0)">
      <text x="0" y="0" class="text-secondary tab-label">History</text>
    </g>
  </g>

  <g transform="translate(1144, 78)">
    <rect x="0" y="0" width="180" height="32" rx="8" fill="#f5f5f7" stroke="#ececee" stroke-width="1"/>
    <g transform="translate(12, 10)" stroke="#86868b" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="6" r="4.5"/>
      <line x1="9.5" y1="9.5" x2="12.5" y2="12.5"/>
    </g>
    <text x="34" y="21" class="text-tertiary" style="font-size: 12px;">Search everything</text>
    <rect x="138" y="6" width="34" height="20" rx="5" fill="#ffffff" stroke="#e5e5e7" stroke-width="1"/>
    <text x="155" y="20" text-anchor="middle" class="text-secondary" style="font-size: 11px; font-weight: 500;">⌘K</text>
  </g>

  <g transform="translate(1344, 76)">
    <rect class="icon-btn" x="0" y="0" width="36" height="36" rx="10"/>
    <g transform="translate(9, 9)" stroke="#6e6e73" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="9" r="2.8"/>
      <path d="M9 0.8 L9 3.4 M9 14.6 L9 17.2 M0.8 9 L3.4 9 M14.6 9 L17.2 9 M3.1 3.1 L5 5 M13 13 L14.9 14.9 M3.1 14.9 L5 13 M13 5 L14.9 3.1"/>
    </g>
  </g>

  <!-- Page header -->
  <g transform="translate(48, 156)">
    <text x="0" y="20" class="text-primary page-title">Dashboard</text>
    <text x="0" y="46" class="text-secondary page-date">Tuesday, 22 April 2026</text>
  </g>

  <!-- Daily card -->
  <g transform="translate(48, 216)">
    <rect class="card" x="0" y="0" width="670" height="388" rx="12"/>
    <g transform="translate(20, 20)">
      <text x="0" y="14" class="text-primary h-col">Daily</text>
      <text x="0" y="36" class="text-secondary h-sub">3 of 5 done · weekdays</text>
      <g transform="translate(590, 0)">
        <circle cx="20" cy="20" r="16" fill="none" stroke="#ececee" stroke-width="3"/>
        <circle cx="20" cy="20" r="16" fill="none" stroke="#0071e3" stroke-width="3"
                stroke-dasharray="60.3 100.5"
                transform="rotate(-90 20 20)" stroke-linecap="round"/>
        <text x="20" y="24" text-anchor="middle" class="text-primary" style="font-size: 11px; font-weight: 600;">3/5</text>
      </g>
    </g>

    <g transform="translate(20, 74)">
      <rect x="0" y="0" width="630" height="34" rx="8" fill="#ffffff" stroke="#d2d2d7" stroke-width="1" stroke-dasharray="4 3"/>
      <g transform="translate(12, 11)" stroke="#86868b" stroke-width="1.6" fill="none" stroke-linecap="round">
        <line x1="0" y1="6" x2="12" y2="6"/>
        <line x1="6" y1="0" x2="6" y2="12"/>
      </g>
      <text x="34" y="22" class="text-tertiary" style="font-size: 13px;">Add a daily routine…</text>
    </g>

    <line class="subtle-div" x1="20" y1="128" x2="650" y2="128"/>

    <!-- Row 1: DONE -->
    <g transform="translate(20, 142)">
      <g transform="translate(0, 10)">
        <rect class="check-done" x="0" y="0" width="20" height="20" rx="5"/>
        <path d="M5 10 L9 14 L15 7" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="32" y="24" class="strike row-title">Morning standup prep</text>
    </g>

    <!-- Row 2: DONE -->
    <g transform="translate(20, 186)">
      <g transform="translate(0, 10)">
        <rect class="check-done" x="0" y="0" width="20" height="20" rx="5"/>
        <path d="M5 10 L9 14 L15 7" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="32" y="24" class="strike row-title">Check work email</text>
    </g>

    <!-- Row 3: DONE -->
    <g transform="translate(20, 230)">
      <g transform="translate(0, 10)">
        <rect class="check-done" x="0" y="0" width="20" height="20" rx="5"/>
        <path d="M5 10 L9 14 L15 7" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="32" y="24" class="strike row-title">Review PRs from yesterday</text>
    </g>

    <!-- Row 4: PENDING -->
    <g transform="translate(20, 274)">
      <g transform="translate(0, 10)">
        <rect class="check-empty" x="0" y="0" width="20" height="20" rx="5"/>
      </g>
      <text x="32" y="24" class="text-primary row-title">Submit timesheet</text>
    </g>

    <!-- Row 5: PENDING — FOCUSED (menu open) -->
    <g transform="translate(20, 318)">
      <rect class="row-focus" x="-4" y="4" width="638" height="36" rx="6"/>
      <g transform="translate(0, 10)">
        <rect class="check-empty" x="0" y="0" width="20" height="20" rx="5"/>
      </g>
      <text x="32" y="24" class="text-primary row-title">Team retro prep</text>
      <g transform="translate(198, 11)">
        <rect class="age-label" x="0" y="0" width="50" height="18" rx="9"/>
        <text x="25" y="13" text-anchor="middle" class="age-label-text chip-text">2d old</text>
      </g>
      <g transform="translate(520, 11)">
        <rect class="chip" x="0" y="0" width="44" height="18" rx="9"/>
        <text x="22" y="13" text-anchor="middle" class="text-secondary chip-text">30m</text>
      </g>
      <!-- active ⋯ button -->
      <g transform="translate(592, 8)">
        <rect x="0" y="0" width="28" height="28" rx="6" fill="#e8f2fd" stroke="#0071e3" stroke-width="1"/>
        <g transform="translate(6, 12)" fill="#0071e3">
          <circle cx="2" cy="2" r="1.6"/><circle cx="8" cy="2" r="1.6"/><circle cx="14" cy="2" r="1.6"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Working card (background, dimmed) -->
  <g transform="translate(738, 216)" opacity="0.5">
    <rect class="card" x="0" y="0" width="654" height="388" rx="12"/>
    <g transform="translate(20, 20)">
      <text x="0" y="14" class="text-primary h-col">Working</text>
      <text x="0" y="36" class="text-secondary h-sub">2 active · 2 completed this week</text>
    </g>
  </g>

  <!-- Notes (background, dimmed) -->
  <g transform="translate(48, 624)" opacity="0.5">
    <rect class="card" x="0" y="0" width="1344" height="240" rx="12"/>
    <g transform="translate(20, 20)">
      <text x="0" y="14" class="text-primary h-col">Notes</text>
      <text x="0" y="36" class="text-secondary h-sub">14 notes · click to open inline</text>
    </g>
  </g>

  <!-- ===== Popover menu ===== -->
  <!-- anchored below the ⋯ button at (638+20+592 = 672+592 = 660-ish) / y ~ 552 -->
  <!-- actual row ⋯: x = 48 + 20 + 592 = 660, y = 216 + 318 + 8 = 542. Menu appears below.  -->
  <g transform="translate(518, 560)">
    <rect class="menu-shadow" x="2" y="6" width="240" height="220" rx="12"/>
    <rect class="menu-card" x="0" y="0" width="240" height="220" rx="12"/>

    <!-- header -->
    <g transform="translate(16, 18)">
      <text x="0" y="0" class="text-tertiary" style="font-size: 11px; font-weight: 600; letter-spacing: 0.5px;">TEAM RETRO PREP</text>
    </g>

    <!-- Complete (hover state) -->
    <rect class="menu-hover" x="6" y="38" width="228" height="36" rx="8"/>
    <g transform="translate(22, 56)" stroke="#0071e3" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 4 L4 8 L11 0"/>
    </g>
    <text x="48" y="60" class="accent-text menu-item">Complete</text>
    <rect x="198" y="48" width="24" height="16" rx="4" fill="#ffffff" stroke="#e5e5e7"/>
    <text x="210" y="60" text-anchor="middle" class="kbd">↵</text>

    <!-- Roll-over -->
    <g transform="translate(22, 92)" stroke="#6e6e73" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 0 A5 5 0 1 0 10 10 L10 7 L13 10 L10 13"/>
    </g>
    <text x="48" y="102" class="text-primary menu-item">Roll-over</text>
    <text x="48" y="116" class="text-tertiary menu-hint">Show again tomorrow</text>

    <!-- Defer -->
    <g transform="translate(22, 132)" stroke="#b26900" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 4 L10 4 M10 4 L6 0 M10 4 L6 8"/>
      <rect x="2" y="10" width="11" height="5" rx="1"/>
    </g>
    <text x="48" y="142" class="text-primary menu-item">Defer</text>
    <text x="48" y="156" class="text-tertiary menu-hint">Skip tomorrow, show day after</text>

    <!-- Drop -->
    <line class="subtle-div" x1="12" y1="168" x2="228" y2="168"/>
    <g transform="translate(22, 180)" stroke="#c7364a" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3 L12 3 M5 3 L5 1 L9 1 L9 3 M3 3 L4 13 L10 13 L11 3"/>
    </g>
    <text x="48" y="190" class="text-danger menu-item">Drop</text>
    <text x="48" y="204" class="text-tertiary menu-hint">Hide forever · visible in History</text>
  </g>
</svg>
