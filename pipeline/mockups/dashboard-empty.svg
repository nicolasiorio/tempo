<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .bg        { fill: #f5f5f7; }
      .window    { fill: #ffffff; stroke: #e5e5e7; stroke-width: 1; }
      .titlebar  { fill: #fbfbfd; }
      .topbar    { fill: #ffffff; }
      .divider   { stroke: #e5e5e7; stroke-width: 1; fill: none; }
      .card      { fill: #ffffff; stroke: #e5e5e7; stroke-width: 1; }
      .chip      { fill: #f2f2f4; }
      .chip-accent-soft { fill: #f0f6fd; }
      .accent    { fill: #0071e3; }
      .accent-text { fill: #0071e3; }
      .text-primary   { fill: #1d1d1f; }
      .text-secondary { fill: #6e6e73; }
      .text-tertiary  { fill: #86868b; }
      .text-muted     { fill: #a1a1a6; }
      .shadow     { fill: #000000; fill-opacity: 0.04; }
      .icon-btn   { fill: #ffffff; stroke: #e5e5e7; stroke-width: 1; }
      .empty-zone { fill: #fafafa; stroke: #ececee; stroke-width: 1; stroke-dasharray: 6 4; }
      text { font-size: 13px; }
      .h-col   { font-size: 18px; font-weight: 600; }
      .h-sub   { font-size: 13px; font-weight: 400; }
      .chip-text { font-size: 11px; font-weight: 500; }
      .tab-label { font-size: 14px; font-weight: 500; }
      .brand  { font-size: 15px; font-weight: 600; letter-spacing: 0.2px; }
      .titlebar-text { font-size: 13px; font-weight: 500; }
      .page-title { font-size: 24px; font-weight: 600; }
      .page-date { font-size: 13px; }
      .empty-title { font-size: 16px; font-weight: 600; }
      .empty-body  { font-size: 13px; }
      .suggestion-text { font-size: 12px; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="900"/>
  <rect class="shadow" x="16" y="24" width="1408" height="860" rx="14"/>
  <rect class="window" x="16" y="20" width="1408" height="860" rx="14"/>

  <!-- OS Titlebar -->
  <rect class="titlebar" x="16" y="20" width="1408" height="44" rx="14"/>
  <rect class="titlebar" x="16" y="48" width="1408" height="16"/>
  <line class="divider" x1="16" y1="64" x2="1424" y2="64"/>
  <circle cx="36" cy="42" r="6" fill="#ff5f57"/>
  <circle cx="56" cy="42" r="6" fill="#febc2e"/>
  <circle cx="76" cy="42" r="6" fill="#28c840"/>
  <!-- empty state: no pending count -->
  <text x="720" y="46" text-anchor="middle" class="text-secondary titlebar-text">tempo</text>

  <!-- Top nav bar -->
  <rect class="topbar" x="17" y="65" width="1406" height="56"/>
  <line class="divider" x1="16" y1="120" x2="1424" y2="120"/>

  <g transform="translate(48, 80)">
    <rect x="0" y="0" width="28" height="28" rx="7" fill="#0071e3"/>
    <path d="M10 8 L20 6 L20 17 A3 3 0 1 1 17 15 L17 9.5 L12.5 10.5 L12.5 19 A3 3 0 1 1 9.5 17 Z" fill="#ffffff"/>
    <text x="40" y="19" class="text-primary brand">tempo</text>
  </g>

  <g transform="translate(180, 92)">
    <g>
      <text x="0" y="0" class="accent-text tab-label">Dashboard</text>
      <rect x="-2" y="12" width="74" height="2" rx="1" class="accent"/>
    </g>
    <g transform="translate(104, 0)">
      <text x="0" y="0" class="text-secondary tab-label">History</text>
    </g>
  </g>

  <g transform="translate(1144, 78)">
    <rect x="0" y="0" width="180" height="32" rx="8" fill="#f5f5f7" stroke="#ececee" stroke-width="1"/>
    <g transform="translate(12, 10)" stroke="#86868b" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="6" r="4.5"/>
      <line x1="9.5" y1="9.5" x2="12.5" y2="12.5"/>
    </g>
    <text x="34" y="21" class="text-tertiary" style="font-size: 12px;">Search everything</text>
    <rect x="138" y="6" width="34" height="20" rx="5" fill="#ffffff" stroke="#e5e5e7" stroke-width="1"/>
    <text x="155" y="20" text-anchor="middle" class="text-secondary" style="font-size: 11px; font-weight: 500;">⌘K</text>
  </g>

  <g transform="translate(1344, 76)">
    <rect class="icon-btn" x="0" y="0" width="36" height="36" rx="10"/>
    <g transform="translate(9, 9)" stroke="#6e6e73" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="9" r="2.8"/>
      <path d="M9 0.8 L9 3.4 M9 14.6 L9 17.2 M0.8 9 L3.4 9 M14.6 9 L17.2 9 M3.1 3.1 L5 5 M13 13 L14.9 14.9 M3.1 14.9 L5 13 M13 5 L14.9 3.1"/>
    </g>
  </g>

  <!-- Page header -->
  <g transform="translate(48, 156)">
    <text x="0" y="20" class="text-primary page-title">Dashboard</text>
    <text x="0" y="46" class="text-secondary page-date">Tuesday, 22 April 2026 · first run</text>
  </g>

  <!-- Welcome banner -->
  <g transform="translate(48, 216)">
    <rect x="0" y="0" width="1344" height="68" rx="12" class="chip-accent-soft"/>
    <g transform="translate(24, 20)" stroke="#0071e3" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="14" cy="14" r="12"/>
      <path d="M14 8 L14 14 L19 17"/>
    </g>
    <text x="88" y="32" class="text-primary" style="font-size: 15px; font-weight: 600;">Welcome to tempo</text>
    <text x="88" y="52" class="text-secondary" style="font-size: 13px;">Three places to keep your day: Daily routines that recur, Working items that persist, and Notes that remember. Start by adding one of each — suggestions below.</text>
  </g>

  <!-- Daily empty -->
  <g transform="translate(48, 308)">
    <rect class="card" x="0" y="0" width="670" height="280" rx="12"/>
    <g transform="translate(20, 20)">
      <text x="0" y="14" class="text-primary h-col">Daily</text>
      <text x="0" y="36" class="text-secondary h-sub">Recurring routines — reset each day</text>
    </g>

    <!-- big inline adder -->
    <g transform="translate(20, 74)">
      <rect x="0" y="0" width="630" height="40" rx="10" fill="#ffffff" stroke="#0071e3" stroke-width="1.5"/>
      <g transform="translate(14, 14)" stroke="#0071e3" stroke-width="1.8" fill="none" stroke-linecap="round">
        <line x1="0" y1="6" x2="12" y2="6"/>
        <line x1="6" y1="0" x2="6" y2="12"/>
      </g>
      <text x="38" y="25" class="accent-text" style="font-size: 13px; font-weight: 500;">Add your first daily routine…</text>
    </g>

    <!-- suggestions -->
    <g transform="translate(20, 140)">
      <text x="0" y="0" class="text-tertiary" style="font-size: 12px; font-weight: 500; letter-spacing: 0.4px;">TRY ONE OF THESE</text>
    </g>

    <g transform="translate(20, 158)">
      <rect x="0" y="0" width="190" height="32" rx="8" fill="#fbfbfd" stroke="#e5e5e7" stroke-width="1"/>
      <text x="14" y="21" class="text-secondary suggestion-text">+ Morning standup prep</text>
    </g>
    <g transform="translate(218, 158)">
      <rect x="0" y="0" width="170" height="32" rx="8" fill="#fbfbfd" stroke="#e5e5e7" stroke-width="1"/>
      <text x="14" y="21" class="text-secondary suggestion-text">+ Check work email</text>
    </g>
    <g transform="translate(396, 158)">
      <rect x="0" y="0" width="150" height="32" rx="8" fill="#fbfbfd" stroke="#e5e5e7" stroke-width="1"/>
      <text x="14" y="21" class="text-secondary suggestion-text">+ Submit timesheet</text>
    </g>

    <g transform="translate(20, 216)">
      <text x="0" y="0" class="text-tertiary" style="font-size: 12px;">Tip · use the toggle on each task to set </text>
      <text x="228" y="0" class="text-primary" style="font-size: 12px; font-weight: 500;">every day</text>
      <text x="280" y="0" class="text-tertiary" style="font-size: 12px;"> or </text>
      <text x="295" y="0" class="text-primary" style="font-size: 12px; font-weight: 500;">weekdays only</text>
      <text x="370" y="0" class="text-tertiary" style="font-size: 12px;">.</text>
    </g>
  </g>

  <!-- Working empty -->
  <g transform="translate(738, 308)">
    <rect class="card" x="0" y="0" width="654" height="280" rx="12"/>
    <g transform="translate(20, 20)">
      <text x="0" y="14" class="text-primary h-col">Working</text>
      <text x="0" y="36" class="text-secondary h-sub">Multi-day items — stay until done</text>
    </g>

    <g transform="translate(20, 74)">
      <rect x="0" y="0" width="614" height="40" rx="10" fill="#ffffff" stroke="#0071e3" stroke-width="1.5"/>
      <g transform="translate(14, 14)" stroke="#0071e3" stroke-width="1.8" fill="none" stroke-linecap="round">
        <line x1="0" y1="6" x2="12" y2="6"/>
        <line x1="6" y1="0" x2="6" y2="12"/>
      </g>
      <text x="38" y="25" class="accent-text" style="font-size: 13px; font-weight: 500;">Add your first working item…</text>
    </g>

    <g transform="translate(20, 140)">
      <text x="0" y="0" class="text-tertiary" style="font-size: 12px; font-weight: 500; letter-spacing: 0.4px;">TRY ONE OF THESE</text>
    </g>

    <g transform="translate(20, 158)">
      <rect x="0" y="0" width="210" height="32" rx="8" fill="#fbfbfd" stroke="#e5e5e7" stroke-width="1"/>
      <text x="14" y="21" class="text-secondary suggestion-text">+ Finish Q2 strategy doc</text>
    </g>
    <g transform="translate(238, 158)">
      <rect x="0" y="0" width="186" height="32" rx="8" fill="#fbfbfd" stroke="#e5e5e7" stroke-width="1"/>
      <text x="14" y="21" class="text-secondary suggestion-text">+ Fix the onboarding bug</text>
    </g>

    <g transform="translate(20, 216)">
      <text x="0" y="0" class="text-tertiary" style="font-size: 12px;">Tip · marking one complete moves it to </text>
      <text x="244" y="0" class="text-primary" style="font-size: 12px; font-weight: 500;">Recently completed</text>
      <text x="344" y="0" class="text-tertiary" style="font-size: 12px;"> for 7 days.</text>
    </g>
  </g>

  <!-- Notes empty -->
  <g transform="translate(48, 608)">
    <rect class="card" x="0" y="0" width="1344" height="250" rx="12"/>
    <g transform="translate(20, 20)">
      <text x="0" y="14" class="text-primary h-col">Notes</text>
      <text x="0" y="36" class="text-secondary h-sub">Markdown notes — standalone, or linked to a task</text>
    </g>

    <g transform="translate(20, 74)">
      <rect x="0" y="0" width="1304" height="40" rx="10" fill="#ffffff" stroke="#0071e3" stroke-width="1.5"/>
      <g transform="translate(14, 14)" stroke="#0071e3" stroke-width="1.8" fill="none" stroke-linecap="round">
        <line x1="0" y1="6" x2="12" y2="6"/>
        <line x1="6" y1="0" x2="6" y2="12"/>
      </g>
      <text x="38" y="25" class="accent-text" style="font-size: 13px; font-weight: 500;">Add your first note…</text>
    </g>

    <g transform="translate(20, 140)">
      <text x="0" y="0" class="text-tertiary" style="font-size: 12px; font-weight: 500; letter-spacing: 0.4px;">TRY ONE OF THESE</text>
    </g>

    <g transform="translate(20, 158)">
      <rect x="0" y="0" width="230" height="32" rx="8" fill="#fbfbfd" stroke="#e5e5e7" stroke-width="1"/>
      <text x="14" y="21" class="text-secondary suggestion-text">+ Meeting notes template</text>
    </g>
    <g transform="translate(258, 158)">
      <rect x="0" y="0" width="200" height="32" rx="8" fill="#fbfbfd" stroke="#e5e5e7" stroke-width="1"/>
      <text x="14" y="21" class="text-secondary suggestion-text">+ Weekly reflection</text>
    </g>
    <g transform="translate(466, 158)">
      <rect x="0" y="0" width="220" height="32" rx="8" fill="#fbfbfd" stroke="#e5e5e7" stroke-width="1"/>
      <text x="14" y="21" class="text-secondary suggestion-text">+ Things to buy this month</text>
    </g>

    <g transform="translate(20, 216)">
      <text x="0" y="0" class="text-tertiary" style="font-size: 12px;">Tip · notes support full markdown (headings, lists, checkboxes, links, code). Click to open inline.</text>
    </g>
  </g>
</svg>
